<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Reader (Color Tolerant)</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    canvas { max-width: 100%; margin-top: 20px; }
  </style>
</head>
<body>

<h2>Upload QR Code (Supports Colored QR)</h2>

<input type="file" id="fileInput" accept="image/*">
<p id="result">Result: None</p>

<canvas id="canvas"></canvas>

<script>
const input = document.getElementById('fileInput');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const resultText = document.getElementById('result');

input.addEventListener('change', handleImage);

function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();
  img.onload = () => processImage(img);
  img.src = URL.createObjectURL(file);
}

function processImage(img) {
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // 🔥 STEP 1: Convert to grayscale
  for (let i = 0; i < imageData.data.length; i += 4) {
    let r = imageData.data[i];
    let g = imageData.data[i + 1];
    let b = imageData.data[i + 2];

    let gray = 0.299 * r + 0.587 * g + 0.114 * b;

    imageData.data[i] = gray;
    imageData.data[i + 1] = gray;
    imageData.data[i + 2] = gray;
  }

  // 🔥 STEP 2: Increase contrast (helps weird colors)
  const contrast = 1.5;
  for (let i = 0; i < imageData.data.length; i += 4) {
    let value = imageData.data[i];
    value = ((value - 128) * contrast) + 128;

    imageData.data[i] =
    imageData.data[i + 1] =
    imageData.data[i + 2] = value;
  }

  // 🔥 STEP 3: Adaptive threshold (basic)
  for (let i = 0; i < imageData.data.length; i += 4) {
    let val = imageData.data[i] > 128 ? 255 : 0;
    imageData.data[i] =
    imageData.data[i + 1] =
    imageData.data[i + 2] = val;
  }

  ctx.putImageData(imageData, 0, 0);

  // 🔍 STEP 4: Decode QR
  const code = jsQR(imageData.data, canvas.width, canvas.height);

  if (code) {
    resultText.innerText = "Result: " + code.data;
  } else {
    resultText.innerText = "Result: QR not detected";
  }
}
</script>

</body>
</html>
